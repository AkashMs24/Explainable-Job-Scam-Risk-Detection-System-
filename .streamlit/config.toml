# ==============================
# .streamlit/config.toml
# Streamlit Configuration
# ==============================

[theme]
primaryColor = "#c8ff00"
backgroundColor = "#080808"
secondaryBackgroundColor = "#111111"
textColor = "#f5f5f5"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = false
showWarningOnDirectExecution = false
maxUploadSize = 10

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
enableXsrfProtection = true
maxUploadSize = 10
sessionExpirationSeconds = 3600
sessionCookieName = "jobguard_session"
sessionCookieSameSite = "Lax"
maxCachedMessageSize = 2
maxMessageSize = 200
enableCORS = true

[runner]
magicEnabled = true
scriptExecutionMode = "rerun"

[browser]
serverAddress = "localhost"
gatherUsageStats = false

[deprecation]
showPyplotGlobalUse = false
