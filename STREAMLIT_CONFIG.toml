[theme]
# ── Color Scheme (Dark Mode) ────────────────────────────────────
primaryColor = "#c8ff00"           # Accent (lime)
backgroundColor = "#080808"        # Dark background
secondaryBackgroundColor = "#111111"  # Slightly lighter
textColor = "#f5f5f5"              # Light text
font = "sans serif"

# ── Fonts ──────────────────────────────────────────────────────
# Default: "sans serif"
# For better look: use Google Fonts via CSS in app

[client]
# ── Toolbar ────────────────────────────────────────────────────
toolbarMode = "minimal"            # Hide unnecessary toolbar on deploy
showErrorDetails = false           # Clean error display for users
showWarningOnDirectExecution = false

# ── File Upload ────────────────────────────────────────────────
maxUploadSize = 10                 # MB (match app.py validation)

[logger]
level = "info"

[server]
# ── Performance ────────────────────────────────────────────────
port = 8501
headless = true                    # Run without browser
runOnSave = true                   # Reload on file change (dev only)
enableXsrfProtection = true        # Security
maxUploadSize = 10                 # MB

# ── Session Management ─────────────────────────────────────────
sessionExpirationSeconds = 3600    # 1 hour timeout
sessionCookieSecret = "randomly-generated-secret-key"
sessionCookieName = "jobguard_session"
sessionCookieSameSite = "Lax"

# ── Memory ────────────────────────────────────────────────────
maxCachedMessageSize = 2           # MB
maxMessageSize = 200               # MB

# ── CORS ───────────────────────────────────────────────────────
enableCORS = true

[client.ribbonMode]
value = "auto"

[deprecation]
showPyplotGlobalUse = false

[runner]
# ── Execution ──────────────────────────────────────────────────
magicEnabled = true
scriptExecutionMode = "rerun"      # Rerun app on input changes

[browser]
# ── Browser Settings ──────────────────────────────────────────
serverAddress = "localhost"
gatherUsageStats = false           # Privacy

[mapbox]
# ── Map Support (unused but good to have) ─────────────────────
token = ""

[logger.logLevel]
streamlit.logger = "info"
asyncio = "error"
