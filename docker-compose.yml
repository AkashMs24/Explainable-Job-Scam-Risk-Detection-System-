# ==============================
# docker-compose.yml
# Full stack: Streamlit UI + FastAPI backend
# ==============================

version: '3.8'

services:
  # ── Streamlit Frontend ────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobguard-streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_RUN_ON_SAVE=false
    volumes:
      - ./app_IMPROVED.py:/app/app.py
      - ./utils_IMPROVED.py:/app/utils.py
      - ./fraud_model.pkl:/app/fraud_model.pkl
      - ./tfidf_vectorizer.pkl:/app/tfidf_vectorizer.pkl
      - ./feature_names.pkl:/app/feature_names.pkl
      - ./predictions.db:/app/predictions.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jobguard-network
    restart: unless-stopped

  # ── FastAPI Backend ──────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobguard-fastapi
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/predictions.db
    volumes:
      - ./fastapi_backend.py:/app/fastapi_backend.py
      - ./utils_IMPROVED.py:/app/utils.py
      - ./fraud_model.pkl:/app/fraud_model.pkl
      - ./tfidf_vectorizer.pkl:/app/tfidf_vectorizer.pkl
      - ./feature_names.pkl:/app/feature_names.pkl
      - ./predictions.db:/app/predictions.db
    command: >
      uvicorn fastapi_backend:app
      --host 0.0.0.0
      --port 8000
      --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jobguard-network
    restart: unless-stopped

  # ── SQLite Database (optional) ───────────────────────────────
  # Using volume-mounted SQLite (no separate service needed)

  # ── Reverse Proxy (Nginx) ────────────────────────────────────
  # Uncomment below to add Nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: jobguard-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - streamlit
  #     - fastapi
  #   networks:
  #     - jobguard-network
  #   restart: unless-stopped

networks:
  jobguard-network:
    driver: bridge

volumes:
  app_cache:
    driver: local
  predictions_db:
    driver: local

# ── Usage Instructions ────────────────────────────────────────────
# Build:
#   docker-compose build
#
# Start:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f
#
# Access services:
#   - Streamlit UI:  http://localhost:8501
#   - FastAPI Docs: http://localhost:8000/docs
#   - FastAPI Health: http://localhost:8000/health
#
# Stop:
#   docker-compose down
#
# Clean up:
#   docker-compose down -v  (removes volumes)
#
# Rebuild:
#   docker-compose build --no-cache && docker-compose up -d
