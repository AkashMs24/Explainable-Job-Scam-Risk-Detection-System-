# ==============================
# docker-compose.yml
# Full Stack: Streamlit + FastAPI
# ==============================

version: '3.8'

services:
  
  # ── Streamlit Frontend ──────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobguard-streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_RUN_ON_SAVE=false
    volumes:
      - ./src/app.py:/app/src/app.py
      - ./src/utils.py:/app/src/utils.py
      - ./src/fraud_model.pkl:/app/src/fraud_model.pkl
      - ./src/tfidf_vectorizer.pkl:/app/src/tfidf_vectorizer.pkl
      - ./src/feature_names.pkl:/app/src/feature_names.pkl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jobguard-network
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobguard-fastapi
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src/fastapi_backend.py:/app/src/fastapi_backend.py
      - ./src/utils.py:/app/src/utils.py
      - ./src/fraud_model.pkl:/app/src/fraud_model.pkl
      - ./src/tfidf_vectorizer.pkl:/app/src/tfidf_vectorizer.pkl
      - ./src/feature_names.pkl:/app/src/feature_names.pkl
    command: >
      uvicorn src.fastapi_backend:app
      --host 0.0.0.0
      --port 8000
      --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jobguard-network
    restart: unless-stopped

networks:
  jobguard-network:
    driver: bridge

volumes:
  app_cache:
    driver: local
